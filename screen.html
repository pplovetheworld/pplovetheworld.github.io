<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大屏幕展示</title>
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        #content { text-align: center; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        img, video { max-width: 100%; max-height: 100%; object-fit: contain; }
        h1 { font-size: 5vw; }
        /* 简单的淡入动画 */
        .fade-in { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
    <!-- 引入 MQTT over WebSocket 客户端库 (Paho) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
</head>
<body>

<div id="content">
    <h1>等待控制指令...</h1>
</div>

<script>
    // === 配置区域 ===
    // 请确保手机和大屏幕使用相同的 TOPIC_PREFIX
    const TOPIC_PREFIX = "school_demo_2026_"; 
    const UNIQUE_ID = "screen_01"; // 屏幕的唯一标识
    const TOPIC = TOPIC_PREFIX + UNIQUE_ID;
    
    // 使用免费的公共 EMQX MQTT Broker (支持 WebSocket)
    const BROKER_URL = "ws://broker.emqx.io:8083/mqtt"; 
    // 如果学校防火墙拦截了 8083，可以尝试 wss://broker.emqx.io:8084/mqtt (注意是 wss)

    const contentDiv = document.getElementById('content');
    
    // 媒体资源列表 (您可以修改这里，或者做成动态加载)
    // 建议图片视频使用图床或公网可访问的链接，因为学校电脑不能配本地服务器
    const playlist = [
        { type: 'text', content: '<h1>欢迎观看演示</h1>' },
        { type: 'image', src: 'https://via.placeholder.com/1920x1080?text=Image+1' }, 
        { type: 'video', src: 'https://www.w3schools.com/html/mov_bbb.mp4' },
        { type: 'image', src: 'https://via.placeholder.com/1920x1080/0000FF/FFFFFF?text=Image+2' }
    ];
    
    let currentIndex = 0;
    let currentElement = null;

    function render(index) {
        if (index < 0 || index >= playlist.length) return;
        const item = playlist[index];
        contentDiv.innerHTML = '';
        contentDiv.className = 'fade-in';
        
        if (item.type === 'text') {
            contentDiv.innerHTML = item.content;
        } else if (item.type === 'image') {
            const img = document.createElement('img');
            img.src = item.src;
            contentDiv.appendChild(img);
            currentElement = img;
        } else if (item.type === 'video') {
            const vid = document.createElement('video');
            vid.src = item.src;
            vid.autoplay = true;
            vid.loop = true;
            vid.muted = false; // 注意：浏览器可能需要用户先交互一次才能播放声音
            contentDiv.appendChild(vid);
            currentElement = vid;
            vid.play().catch(e => console.log("需用户交互才能播放音频"));
        }
    }

    // 连接 MQTT
    const client = new Paho.MQTT.Client(BROKER_URL, "client_screen_" + Math.random());
    
    client.onConnectionLost = function (responseObject) {
        console.log("连接丢失，正在重连...");
        setTimeout(() => client.connect({onSuccess: onConnect}), 5000);
    };

    client.onMessageArrived = function (message) {
        const cmd = JSON.parse(message.payloadString);
        console.log("收到指令:", cmd);
        
        if (cmd.action === 'next') {
            currentIndex = (currentIndex + 1) % playlist.length;
            render(currentIndex);
        } else if (cmd.action === 'prev') {
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            render(currentIndex);
        } else if (cmd.action === 'play') {
            if (currentElement && currentElement.tagName === 'VIDEO') currentElement.play();
        } else if (cmd.action === 'pause') {
            if (currentElement && currentElement.tagName === 'VIDEO') currentElement.pause();
        } else if (cmd.action === 'goto' && typeof cmd.index === 'number') {
            currentIndex = cmd.index;
            render(currentIndex);
        }
    };

    function onConnect() {
        console.log("已连接到控制服务器");
        client.subscribe(TOPIC);
        render(0); // 初始化显示第一个
    }

    client.connect({onSuccess: onConnect});
    
    // 防止休眠 (Wake Lock API)
    if ('wakeLock' in navigator) {
        navigator.wakeLock.request('screen').catch(err => console.log(err));
    }
</script>
</body>
</html>
