<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大屏轮播 (无缝双缓冲版)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* 纯黑背景 */
            font-family: sans-serif;
        }

        /* 屏幕容器 */
        #screen {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 通用图片样式 */
        .slide-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* 保持比例居中 */
            opacity: 0; /* 默认隐藏 */
            transition: opacity 1s ease-in-out; /* 1秒淡入淡出过渡 */
            will-change: opacity; /* 性能优化 */
        }

        /* 显示状态的类 */
        .slide-img.active {
            opacity: 1;
            z-index: 10;
        }

        /* 隐藏状态的类 (虽然 opacity 0 了，但保留占位以防万一) */
        .slide-img.hidden {
            opacity: 0;
            z-index: 1;
        }

        /* 状态栏 */
        #status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #fff;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="screen">
    <!-- 图层 A: 主显示层 -->
    <img id="img-main" class="slide-img active" src="" alt="Slide A">
    <!-- 图层 B: 预加载缓冲层 -->
    <img id="img-buffer" class="slide-img hidden" src="" alt="Slide B">
</div>

<div id="status">系统初始化...</div>

<!-- MQTT 库 -->
<script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>

<script>
    // ================= 配置区 =================
    
    // 1. 图片列表 (请确保 images 文件夹下有这些文件)
    const LIST_SLIDESHOW = [
        '001.jpg',
        '002.jpg',
        '003.jpg',
        '004.jpg',
        '005.jpg'
        // 添加更多图片...
    ];

    // 2. MQTT 配置
    const MQTT_CONFIG = {
        broker: 'wss://broker.emqx.io:8083/mqtt', 
        topic: 'digital-signage/control'
    };

    // ================= 核心变量 =================
    let currentMode = 'none';
    let currentSlideIndex = -1;
    let slideshowTimer = null;
    
    // 双缓冲状态标记: 'main' 表示 img-main 正在显示，'buffer' 表示 img-buffer 正在显示
    let activeLayer = 'main'; 
    
    // DOM 元素
    const dom = {
        mainImg: document.getElementById('img-main'),
        bufferImg: document.getElementById('img-buffer'),
        status: document.getElementById('status')
    };

    // ================= 初始化 =================
    window.onload = function() {
        console.log("✅ 页面加载完成 (双缓冲版)");
        dom.status.innerText = "⏳ 等待连接...";
        
        // 预加载第一张图到主图层，避免初始黑屏
        if (LIST_SLIDESHOW.length > 0) {
            const firstUrl = getImageUrl(LIST_SLIDESHOW[0]);
            dom.mainImg.src = firstUrl;
            // 注意：这里不等待 onload 就显示，是为了防止首屏长时间黑屏
            // 如果图片很大，可能会先看到破图图标，稍后我们可以优化这个细节
        }

        connectMQTT();
    };

    // 辅助：构建图片 URL
    function getImageUrl(filename) {
        const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
        return `${baseUrl}images/${filename}?t=${new Date().getTime()}`;
    }

    // ================= MQTT 逻辑 =================
    function connectMQTT() {
        console.log("📡 正在连接:", MQTT_CONFIG.broker);
        
        try {
            const client = mqtt.connect(MQTT_CONFIG.broker, {
                clientId: 'screen_' + Math.random().toString(16).substr(2, 8),
                clean: true,
                reconnectPeriod: 2000
            });

            client.on('connect', () => {
                console.log("✅ MQTT 连接成功");
                dom.status.innerText = "✅ 已连接 (等待指令)";
                client.subscribe(MQTT_CONFIG.topic);
            });

            client.on('message', (topic, message) => {
                handleCommand(message.toString());
            });

            client.on('error', (err) => {
                console.error("❌ MQTT 错误:", err);
                dom.status.innerText = "⚠️ 连接错误";
            });

        } catch (e) {
            console.error("❌ MQTT 启动失败:", e);
            dom.status.innerText = "❌ 启动失败";
        }
    }

    function handleCommand(msg) {
        let mode = '';
        try {
            if (msg.startsWith('{')) {
                const data = JSON.parse(msg);
                if (data.action === 'switchMode') mode = data.mode;
            } else {
                if (msg.includes('slideshow')) mode = 'slideshow';
                if (msg.includes('stop') || msg.includes('none')) mode = 'none';
            }
        } catch(e) {}

        if (mode === 'slideshow') switchMode('slideshow');
        else if (mode === 'none') switchMode('none');
    }

    function switchMode(mode) {
        if (mode === currentMode) return;
        currentMode = mode;

        if (slideshowTimer) {
            clearInterval(slideshowTimer);
            slideshowTimer = null;
        }

        if (mode === 'slideshow') {
            dom.status.innerText = "🚀 开始无缝轮播";
            if (currentSlideIndex === -1) currentSlideIndex = 0;
            
            // 立即执行一次切换逻辑
            performNextSlide();
            
            slideshowTimer = setInterval(performNextSlide, 5000); // 5秒间隔
        } else {
            dom.status.innerText = "⏸️ 已停止";
        }
    }

    // ================= 核心：双缓冲切换逻辑 =================
    function performNextSlide() {
        if (currentMode !== 'slideshow') return;

        // 1. 计算下一张索引
        currentSlideIndex = (currentSlideIndex + 1) % LIST_SLIDESHOW.length;
        const fileName = LIST_SLIDESHOW[currentSlideIndex];
        const nextUrl = getImageUrl(fileName);

        console.log(`⬇️ 准备预加载: ${fileName}`);
        dom.status.innerText = `⬇️ 预加载: ${fileName}...`;

        // 2. 确定哪个是“隐藏层” (即将用来加载新图的层)
        // 如果当前 active 是 main，那么 buffer 就是隐藏层，反之亦然
        const nextActiveLayer = (activeLayer === 'main') ? 'buffer' : 'main';
        
        const currentActiveImg = (activeLayer === 'main') ? dom.mainImg : dom.bufferImg;
        const nextHiddenImg = (nextActiveLayer === 'main') ? dom.mainImg : dom.bufferImg;

        // 3. 重置隐藏层的状态
        nextHiddenImg.classList.remove('active');
        nextHiddenImg.classList.add('hidden');
        
        // 4. 开始加载新图到隐藏层
        // 关键点：此时用户看到的还是 currentActiveImg (旧图)，完全无黑屏
        nextHiddenImg.src = nextUrl;

        // 5. 监听加载完成
        nextHiddenImg.onload = function() {
            console.log(`✅ 加载完成: ${fileName}，执行切换`);
            
            // 确保图片真的加载成功了再切换
            // 交换显示状态
            currentActiveImg.classList.remove('active');
            currentActiveImg.classList.add('hidden');

            nextHiddenImg.classList.remove('hidden');
            nextHiddenImg.classList.add('active');

            // 更新状态标记
            activeLayer = nextActiveLayer;

            dom.status.innerText = `✨ 显示中: ${fileName}`;
        };

        nextHiddenImg.onerror = function() {
            console.error(`❌ 加载失败: ${fileName}`);
            dom.status.innerText = `❌ 失败: ${fileName} (跳过)`;
            // 即使失败，也强制切换状态，防止逻辑卡死，虽然用户会看到旧图或多张旧图
            // 这里选择不切换 activeLayer，让用户继续看旧图，直到下一张成功
        };
    }
</script>
</body>
</html>
