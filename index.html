<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能大屏轮播系统</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Arial', sans-serif;
        }

        #screen {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #mainImage {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
            opacity: 0; /* 初始隐藏，加载完成后淡入 */
            transition: opacity 0.5s ease-in-out;
        }

        #mainImage.loaded {
            opacity: 1;
        }

        #status-bar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 99;
            transition: opacity 0.5s;
        }
        
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- 加载遮罩 -->
    <div id="loading-overlay">
        <div>系统初始化中...</div>
    </div>

    <!-- 主屏幕 -->
    <div id="screen">
        <img id="mainImage" src="" alt="Slideshow Content">
    </div>

    <!-- 状态栏 -->
    <div id="status-bar">⏳ 等待指令...</div>

    <!-- MQTT 库 (使用 CDN) -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <script>
        // ================= 配置区域 =================
        const CONFIG = {
            // MQTT 配置 (请根据实际环境修改)
            mqttBroker: 'wss://broker.emqx.io:8083/mqtt', // 示例公共 Broker，生产环境请替换
            mqttTopic: 'digital-signage/control',         // 控制主题
            mqttClientID: 'screen_' + Math.random().toString(16).substr(2, 8),
            
            // 轮播配置
            slideInterval: 5000, // 5秒
            imageFolder: 'images/',
            // 自动扫描 images 文件夹下的文件需要后端支持，这里暂时手动列出或使用通配符逻辑
            // 为了演示，我们假设文件名是 001.jpg 到 099.jpg，或者你可以在下方手动列表
            fileList: [] 
        };

        // ================= 全局状态 =================
        let state = {
            currentMode: 'none', // 'none' | 'slideshow' | 'video'
            currentSlideIndex: -1,
            isPreloading: false,
            nextSlidePending: false,
            slideshowTimer: null,
            preloadImg: new Image()
        };

        // DOM 元素
        const dom = {
            mainImg: document.getElementById('mainImage'),
            status: document.getElementById('status-bar'),
            overlay: document.getElementById('loading-overlay')
        };

        // ================= 初始化逻辑 =================
        window.addEventListener('DOMContentLoaded', async () => {
            console.log("🚀 系统启动...");
            
            // 1. 尝试获取图片列表 (如果有后端 API 最好，这里模拟生成或手动指定)
            // 注意：浏览器无法直接读取本地文件夹列表，通常需要后端 API 或手动配置
            // 如果你有 filelist.json，可以在这里 fetch
            await loadImageList();

            // 2. 恢复上次状态
            restoreState();

            // 3. 初始化 MQTT
            initMQTT();

            // 4. 移除加载遮罩
            setTimeout(() => {
                dom.overlay.classList.add('hidden');
                if (state.currentMode === 'none' && CONFIG.fileList.length > 0) {
                    dom.status.innerText = "✅ 就绪 (等待自动轮播指令)";
                    // 如果恢复了轮播模式，直接启动
                    if (localStorage.getItem('lastMode') === 'slideshow') {
                        switchMode('slideshow');
                    }
                }
            }, 1000);
        });

        // ================= 核心功能函数 =================

        // 模拟/加载图片列表
        async function loadImageList() {
            // 方案 A: 如果你有 filelist.json
            try {
                // const res = await fetch('filelist.json');
                // CONFIG.fileList = await res.json();
                
                // 方案 B: 临时硬编码测试 (请根据实际情况修改，或替换为真实列表)
                // 这里生成 001.jpg 到 010.jpg 作为示例
                for (let i = 1; i <= 10; i++) {
                    CONFIG.fileList.push(i.toString().padStart(3, '0') + '.jpg');
                }
                console.log(`📋 已加载 ${CONFIG.fileList.length} 张图片:`, CONFIG.fileList);
            } catch (e) {
                console.error("❌ 加载图片列表失败", e);
                dom.status.innerText = "❌ 图片列表加载失败";
            }
        }

        // 恢复状态
        function restoreState() {
            const savedMode = localStorage.getItem('lastMode');
            const savedIndex = parseInt(localStorage.getItem('lastSlideIndex') || '-1');
            
            if (savedMode) {
                console.log(`🔄 检测到上次模式: ${savedMode}, 索引: ${savedIndex}`);
                state.currentMode = savedMode;
                state.currentSlideIndex = savedIndex;
                
                // 如果是轮播模式，先显示最后一张图，但不启动定时器（等 MQTT 或手动触发）
                if (savedMode === 'slideshow' && CONFIG.fileList[savedIndex]) {
                    const imgUrl = CONFIG.imageFolder + CONFIG.fileList[savedIndex];
                    dom.mainImg.src = imgUrl;
                    dom.mainImg.classList.add('loaded');
                    dom.status.innerText = `📸 恢复显示: ${CONFIG.fileList[savedIndex]}`;
                }
            }
        }

        // 模式切换 (被 MQTT 调用)
        function switchMode(mode) {
            console.log(`🔄 请求切换模式: ${mode}`);
            
            if (mode === state.currentMode) {
                console.log("ℹ️ 模式未变化，忽略");
                return;
            }

            // 清理旧定时器
            if (state.slideshowTimer) {
                clearInterval(state.slideshowTimer);
                state.slideshowTimer = null;
            }

            state.currentMode = mode;
            localStorage.setItem('lastMode', mode); // 保存状态

            if (mode === 'slideshow') {
                console.log("✅ 进入轮播模式");
                dom.status.innerText = "🚀 启动轮播...";
                
                // 重置索引以便从下一张开始，或者保持当前
                if (state.currentSlideIndex === -1) state.currentSlideIndex = 0;
                
                // 立即执行一次
                nextSlide();
                
                // 启动定时器
                state.slideshowTimer = setInterval(() => {
                    // 简单的日志，详细日志在 nextSlide 内部
                    // console.log("⏰ 定时器心跳"); 
                    nextSlide();
                }, CONFIG.slideInterval);

            } else if (mode === 'none') {
                console.log("⏸️ 停止轮播");
                dom.status.innerText = "⏸️ 已暂停";
                state.currentSlideIndex = -1;
            }
        }

        // ================= 优化后的 nextSlide (核心修复) =================
        function nextSlide() {
            // 1. 基础守卫
            if (state.currentMode !== 'slideshow') {
                // 静默返回，避免刷屏
                return;
            }

            if (state.isPreloading) {
                console.log("⏳ 正在加载中，标记为待处理");
                state.nextSlidePending = true;
                return;
            }

            // 2. 计算下一张
            const nextIndex = (state.currentSlideIndex + 1) % CONFIG.fileList.length;
            const nextFilename = CONFIG.fileList[nextIndex];
            
            // 动态构建 URL (添加时间戳防止缓存)
            // 自动适配当前页面路径，防止子目录部署出错
            const basePath = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
            const nextUrl = basePath + CONFIG.imageFolder + nextFilename + '?t=' + Date.now();

            console.log(`--- [Switch] ${state.currentSlideIndex} -> ${nextIndex} (${nextFilename}) ---`);

            // 3. 设置状态
            state.isPreloading = true;
            dom.status.innerText = `⬇️ 预加载: ${nextFilename}...`;

            // 4. 准备加载器
            const loader = state.preloadImg;
            
            // 清除旧事件监听，防止累积
            loader.onload = null;
            loader.onerror = null;

            // 绑定新事件
            loader.onload = () => {
                console.log(`✅ [Success] ${nextFilename}`);
                
                // 更新状态
                state.isPreloading = false;
                state.currentSlideIndex = nextIndex;
                localStorage.setItem('lastSlideIndex', nextIndex); // 保存进度

                // 切换主图
                dom.mainImg.src = nextUrl;
                dom.mainImg.classList.add('loaded'); // 确保显示
                
                dom.status.innerText = `✨ 显示中: ${nextFilename}`;

                // 处理积压请求
                if (state.nextSlidePending) {
                    console.log("🔄 检测到积压，立即触发下一次");
                    state.nextSlidePending = false;
                    setTimeout(nextSlide, 100); // 稍微延迟避免栈溢出
                }
            };

            loader.onerror = (e) => {
                console.error(`❌ [Failed] ${nextFilename}`, e);
                
                state.isPreloading = false;
                // 即使失败也更新索引，防止死锁在坏图上
                state.currentSlideIndex = nextIndex;
                localStorage.setItem('lastSlideIndex', nextIndex);

                dom.status.innerText = `❌ 加载失败: ${nextFilename} (跳过)`;

                // 尝试下一张
                if (state.nextSlidePending) {
                    state.nextSlidePending = false;
                    setTimeout(nextSlide, 100);
                } else {
                    // 如果没有积压，也强制推进一步，避免卡住
                    setTimeout(nextSlide, 1000); 
                }
            };

            // 5. 发起请求
            console.log(`🚀 请求: ${nextUrl}`);
            loader.src = nextUrl;
        }

        // ================= MQTT 连接逻辑 =================
        function initMQTT() {
            console.log("📡 正在连接 MQTT...", CONFIG.mqttBroker);
            
            // 注意：生产环境请使用安全的 wss 和正确的认证
            const options = {
                clientId: CONFIG.mqttClientID,
                clean: true,
                connectTimeout: 4000,
                reconnectPeriod: 1000,
            };

            try {
                const client = mqtt.connect(CONFIG.mqttBroker, options);

                client.on('connect', () => {
                    console.log("✅ MQTT 连接成功");
                    client.subscribe(CONFIG.mqttTopic, (err) => {
                        if (!err) {
                            console.log(`📩 已订阅主题: ${CONFIG.mqttTopic}`);
                            
                            // 连接成功后，检查是否需要恢复轮播
                            if (localStorage.getItem('lastMode') === 'slideshow') {
                                console.log("🔄 连接建立，恢复轮播模式");
                                switchMode('slideshow');
                            }
                        } else {
                            console.error("❌ 订阅失败", err);
                        }
                    });
                });

                client.on('message', (topic, message) => {
                    console.log(`📩 收到消息 [${topic}]:`, message.toString());
                    handleMqttMessage(message.toString());
                });

                client.on('error', (err) => {
                    console.error("❌ MQTT 错误:", err);
                    dom.status.innerText = "⚠️ 连接错误";
                });

                client.on('reconnect', () => {
                    console.log("🔄 正在重连 MQTT...");
                });

            } catch (e) {
                console.error("❌ MQTT 初始化失败:", e);
                dom.status.innerText = "⚠️ MQTT 初始化失败";
            }
        }

        function handleMqttMessage(payload) {
            try {
                // 支持 JSON 格式: {"action": "switchMode", "mode": "slideshow"}
                // 也支持纯文本格式: "slideshow", "stop"
                let data;
                if (payload.startsWith('{')) {
                    data = JSON.parse(payload);
                } else {
                    // 兼容简单文本指令
                    const text = payload.toLowerCase();
                    if (text.includes('slideshow') || text.includes('auto')) {
                        data = { action: 'switchMode', mode: 'slideshow' };
                    } else if (text.includes('stop') || text.includes('pause')) {
                        data = { action: 'switchMode', mode: 'none' };
                    } else {
                        console.warn("⚠️ 未知指令格式:", payload);
                        return;
                    }
                }

                if (data.action === 'switchMode') {
                    switchMode(data.mode);
                } else {
                    console.warn("⚠️ 未知动作:", data.action);
                }

            } catch (e) {
                console.error("❌ 解析消息失败:", e, payload);
            }
        }

    </script>
</body>
</html>
