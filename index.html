<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂演示控制器</title>
    <!-- 引入 PeerJS 库 -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
        #screen { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #media-container { width: 80%; height: 80%; display: flex; justify-content: center; align-items: center; }
        img, video { max-width: 100%; max-height: 100%; object-fit: contain; }
        #controls { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; display: none; }
        button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; background: #333; color: white; border: 1px solid #555; border-radius: 5px; }
        button:hover { background: #555; }
        .hidden { display: none !important; }
        #status { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 4px; font-size: 12px; }
        
        /* 手机端控制器样式 */
        #mobile-ui { padding: 20px; display: none; }
        .control-group { margin-bottom: 20px; border: 1px solid #444; padding: 15px; border-radius: 8px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        .mode-btn { width: 100%; padding: 15px; margin: 5px 0; font-size: 18px; }
        #connection-id-display { font-weight: bold; color: #4CAF50; word-break: break-all;}
    </style>
</head>
<body>

    <!-- 状态显示 -->
    <div id="status">正在连接...</div>

    <!-- 大屏显示区域 -->
    <div id="screen">
        <div id="media-container">
            <h1 id="placeholder-text">等待控制端连接...</h1>
        </div>
        <!-- 大屏上的简单控制按钮（可选，防止手机失灵） -->
        <div id="controls">
            <button onclick="togglePlay()">播放/暂停</button>
            <button onclick="nextMedia()">下一个</button>
        </div>
    </div>

    <!-- 手机端控制界面 (默认隐藏，通过 URL 参数 ?role=controller 激活) -->
    <div id="mobile-ui">
        <h2>📱 手机控制台</h2>
        <div class="control-group">
            <p>1. 在大屏电脑上打开此页面。</p>
            <p>2. 将下方显示的 <strong>ID</strong> 输入到下面的框中：</p>
            <div id="pc-id-display" style="background:#222; padding:10px; margin:5px 0; color:#aaa;">等待大屏 ID...</div>
            <input type="text" id="remote-id-input" placeholder="输入大屏电脑的 ID">
            <button onclick="connectToPC()" style="width:100%; margin-top:10px; background:#2196F3;">连接大屏</button>
        </div>

        <div class="control-group hidden" id="active-controls">
            <h3>媒体控制</h3>
            <button class="mode-btn" style="background:#4CAF50;" onclick="sendCmd('play')">▶️ 播放</button>
            <button class="mode-btn" style="background:#FF9800;" onclick="sendCmd('pause')">⏸️ 暂停</button>
            <button class="mode-btn" style="background:#F44336;" onclick="sendCmd('stop')">⏹️ 停止/清空</button>
            
            <h3>切换内容</h3>
            <label>图片 URL:</label>
            <input type="text" id="img-url" placeholder="https://example.com/image.jpg">
            <button onclick="sendLoad('image', document.getElementById('img-url').value)">加载图片</button>
            
            <label>视频 URL:</label>
            <input type="text" id="vid-url" placeholder="https://example.com/video.mp4">
            <button onclick="sendLoad('video', document.getElementById('vid-url').value)">加载视频</button>
            
            <label>本地文件 (需在同一网络或通过简单服务器，纯本地文件受限于浏览器安全策略可能无法直接传URL，建议用URL):</label>
            <input type="file" id="local-file" onchange="handleFileSelect(this)">
            <p style="font-size:12px; color:#aaa;">提示：对于本地文件，最好将图片和视频放在与 html 同级的文件夹，然后输入相对路径，如 'images/pic1.jpg'</p>
             <input type="text" id="local-path" placeholder="例如：assets/bg.jpg">
             <button onclick="sendLoad('image', document.getElementById('local-path').value)">加载本地相对路径图片</button>
        </div>
    </div>

    <script>
        let peer = null;
        let conn = null;
        const isController = new URLSearchParams(window.location.search).get('role') === 'controller';
        const statusEl = document.getElementById('status');
        const mediaContainer = document.getElementById('media-container');
        const placeholderText = document.getElementById('placeholder-text');

        // 初始化 PeerJS
        function initPeer() {
            // 使用 PeerJS 公共云服务器 (无需自己搭建)
            peer = new Peer(null, {
                debug: 2
            });

            peer.on('open', (id) => {
                statusEl.innerText = "已连接。ID: " + id;
                if (!isController) {
                    // 大屏模式：显示 ID 供手机输入
                    document.getElementById('pc-id-display').innerText = "大屏 ID: " + id;
                    document.getElementById('placeholder-text').innerText = "等待手机连接...\n请在手机浏览器打开本网页\n并在输入框输入上方 ID";
                    document.getElementById('placeholder-text').style.whiteSpace = "pre-line";
                } else {
                    // 手机模式：准备输入
                    document.getElementById('pc-id-display').innerText = "请查看大屏上的 ID";
                    document.getElementById('mobile-ui').style.display = 'block';
                    document.getElementById('screen').classList.add('hidden');
                }
            });

            peer.on('error', (err) => {
                statusEl.innerText = "错误: " + err.type;
                alert("连接错误: " + err.type);
            });

            // 接收连接 (大屏端逻辑)
            peer.on('connection', (c) => {
                conn = c;
                setupConnection();
                statusEl.innerText = "手机已连接!";
                placeholderText.innerText = "已连接手机，等待指令...";
            });
        }

        // 主动连接 (手机端逻辑)
        function connectToPC() {
            const remoteId = document.getElementById('remote-id-input').value.trim();
            if (!remoteId) return alert("请输入 ID");
            
            conn = peer.connect(remoteId);
            setupConnection();
        }

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('active-controls').classList.remove('hidden');
                statusEl.innerText = "连接成功！";
            });

            conn.on('data', (data) => {
                handleData(data);
            });
            
            conn.on('close', () => {
                statusEl.innerText = "连接断开";
                conn = null;
            });
        }

        // 处理接收到的数据 (大屏端执行)
        function handleData(data) {
            console.log("收到指令:", data);
            const container = document.getElementById('media-container');
            
            if (data.cmd === 'play') {
                const video = container.querySelector('video');
                if (video) video.play();
            } else if (data.cmd === 'pause') {
                const video = container.querySelector('video');
                if (video) video.pause();
            } else if (data.cmd === 'stop') {
                container.innerHTML = '<h1>已停止</h1>';
            } else if (data.type === 'load') {
                container.innerHTML = ''; // 清空
                if (data.mediaType === 'image') {
                    const img = document.createElement('img');
                    img.src = data.url;
                    img.onerror = () => container.innerHTML = '<h1 style="color:red">图片加载失败</h1>';
                    container.appendChild(img);
                } else if (data.mediaType === 'video') {
                    const video = document.createElement('video');
                    video.src = data.url;
                    video.controls = true;
                    video.autoplay = true;
                    video.style.width = "100%";
                    video.style.height = "100%";
                    container.appendChild(video);
                }
            }
        }

        // 发送指令 (手机端执行)
        function sendCmd(cmd) {
            if (conn && conn.open) {
                conn.send({ cmd: cmd });
            } else {
                alert("未连接到大屏");
            }
        }

        function sendLoad(type, url) {
            if (!url) return alert("请输入地址");
            if (conn && conn.open) {
                conn.send({ type: 'load', mediaType: type, url: url });
            } else {
                alert("未连接到大屏");
            }
        }
        
        function handleFileSelect(input) {
            // 注意：纯前端 P2P 无法直接发送文件对象给另一个标签页显示，除非使用 FileReader 转 Base64
            // 这里做一个简单的 Base64 演示，适合小图片
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                if (conn && conn.open) {
                    // 发送 Base64 数据
                    conn.send({ 
                        type: 'load', 
                        mediaType: 'image', 
                        url: e.target.result 
                    });
                }
            };
            reader.readAsDataURL(file);
        }

        // 大屏端辅助功能
        function togglePlay() {
            const video = mediaContainer.querySelector('video');
            if(video) video.paused ? video.play() : video.pause();
        }
        function nextMedia() {
             mediaContainer.innerHTML = '<h1>等待下一条指令</h1>';
        }

        // 启动
        initPeer();
    </script>
</body>
</html>
