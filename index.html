<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>课堂多媒体控制系统</title>
    <!-- 引入 MQTT over WebSocket 库 -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #fff; overflow: hidden; }
        
        /* 显示区域 */
        #display-area {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #000; z-index: 1;
        }
        #display-area img, #display-area video {
            max-width: 100%; max-height: 100%; object-fit: contain;
            display: none;
        }
        #display-area.active img, #display-area.active video { display: block; }

        /* 通用控制面板样式 (大屏端可见) */
        #dashboard-ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 12px;
            z-index: 10; text-align: center; backdrop-filter: blur(5px);
            border: 1px solid #444; transition: opacity 0.3s;
        }
        .status-badge {
            display: inline-block; padding: 4px 8px; background: #333; 
            border-radius: 4px; font-size: 12px; margin-bottom: 10px; color: #aaa;
        }
        .connected { color: #4CAF50; border: 1px solid #4CAF50; }
        
        /* 按钮网格 */
        .grid-controls { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .btn {
            background: #333; color: white; border: 1px solid #555; 
            padding: 10px; border-radius: 6px; cursor: pointer; font-size: 14px;
            transition: 0.2s; text-align: left;
        }
        .btn:hover { background: #444; border-color: #888; }
        .btn:active { background: #4CAF50; border-color: #4CAF50; color: #fff; }
        .btn.full { grid-column: span 2; text-align: center; font-weight: bold; }
        .btn.danger { border-color: #f44336; color: #ffcccc; }
        .btn.danger:active { background: #f44336; color: white; }

        /* 手机端专用控制器 (覆盖层) */
        #mobile-controller {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; z-index: 100; display: none;
            flex-direction: column; padding: 20px; box-sizing: border-box;
            overflow-y: auto;
        }
        #mobile-controller.active { display: flex; }
        .controller-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 5px; color: #aaa; }
        .input-group input {
            width: 100%; padding: 12px; background: #333; border: 1px solid #555;
            color: white; border-radius: 6px; font-size: 16px; box-sizing: border-box;
        }
        .connect-btn {
            width: 100%; padding: 15px; background: #2196F3; color: white;
            border: none; border-radius: 6px; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }
        .connect-btn:disabled { background: #555; cursor: not-allowed; }

        /* 状态提示 */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
            border-radius: 20px; z-index: 200; opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        #toast.show { opacity: 1; }

        /* 隐藏大屏控件当处于遥控模式时 */
        body.remote-mode #dashboard-ui { display: none; }
        body.remote-mode #display-area { display: none; } /* 手机端不显示大图 */
    </style>
</head>
<body>

    <!-- 大屏显示区 -->
    <div id="display-area">
        <img id="main-image" src="" alt="">
        <video id="main-video" src="" loop muted playsinline></video>
    </div>

    <!-- 大屏端状态与控制入口 -->
    <div id="dashboard-ui">
        <div class="status-badge" id="connection-status">正在初始化...</div>
        <div style="margin-bottom: 10px; font-size: 12px; color: #888;">房间号：<span id="room-display">CLASS20241</span></div>
        
        <div class="grid-controls">
            <button class="btn full" onclick="toggleRemoteMode()">📱 切换为手机遥控器</button>
            <button class="btn" onclick="sendCommand('slideshow')">🖼️ 自动轮播</button>
            <button class="btn" onclick="sendCommand('showA')">🖼️ 展示组 A</button>
            <button class="btn" onclick="sendCommand('showB')">🖼️ 展示组 B</button>
            <button class="btn" onclick="sendCommand('playVideo')">🎥 播放视频</button>
            <button class="btn danger" onclick="sendCommand('stop')">⏹️ 停止/黑屏</button>
            <button class="btn" onclick="sendCommand('togglePlay')">⏯️ 播放/暂停</button>
            <button class="btn" onclick="toggleFullscreen()">📺 全屏</button>
        </div>
        <div style="margin-top:10px; font-size: 11px; color: #666;">提示：手机和大屏需在同一网络，或手机直接访问此链接并切换模式</div>
    </div>

    <!-- 手机端遥控界面 -->
    <div id="mobile-controller">
        <div class="controller-header">
            <h2>📱 课堂遥控器</h2>
            <button class="close-btn" onclick="exitRemoteMode()">✕</button>
        </div>
        
        <div id="login-panel">
            <div class="input-group">
                <label>房间号 (需与大屏一致)</label>
                <input type="text" id="room-input" value="CLASS20241" placeholder="输入房间号">
            </div>
            <button class="connect-btn" id="btn-connect" onclick="startRemoteControl()">连接大屏</button>
            <p style="color: #666; font-size: 12px; margin-top: 15px; text-align: center;">
                确保手机和大屏都联网。<br>使用公共信令服务器 (无需配置)
            </p>
        </div>

        <div id="control-panel" style="display: none; flex: 1; display: none; flex-direction: column; gap: 15px;">
            <div class="status-badge connected" id="remote-status">已连接</div>
            
            <div class="grid-controls" style="flex: 1;">
                <button class="btn full" style="background: #2196F3; border-color: #2196F3;" onclick="sendCommand('slideshow')">🖼️ 启动自动轮播</button>
                <button class="btn" onclick="sendCommand('showA')">🖼️ 展示组 A</button>
                <button class="btn" onclick="sendCommand('showB')">🖼️ 展示组 B</button>
                <button class="btn" onclick="sendCommand('playVideo')">🎥 播放视频</button>
                <button class="btn danger" onclick="sendCommand('stop')">⏹️ 停止</button>
                <button class="btn" onclick="sendCommand('togglePlay')">⏯️ 暂停/继续</button>
            </div>
        </div>
    </div>

    <div id="toast">操作已发送</div>

<script>
    // === 配置 ===
    const DEFAULT_ROOM = 'CLASS20241';
    // 使用公共 MQTT Broker (HiveMQ) - 无需注册，适合测试和轻量使用
    // 注意：公共频道可能被他人看到，请勿传输敏感数据。生产环境建议自建或使用私有云。
    const MQTT_OPTIONS = {
        hostname: 'broker.hivemq.com',
        port: 8000, // WebSocket Port
        path: '/mqtt',
        clientId: 'classroom_' + Math.random().toString(16).substr(2, 8),
        clean: true
    };

    // === 资源列表 ===
    const ASSETS = {
        slideshow: ['images/001.jpg', 'images/002.jpg', 'images/003.jpg', 'images/004.jpg', 'images/005.jpg'],
        A: 'images2/A.jpg',
        B: 'images3/B.jpg',
        video: 'videos/A1.mp4'
    };

    // === 全局变量 ===
    let client = null;
    let currentRoom = DEFAULT_ROOM;
    let isRemoteMode = false;
    
    // 大屏状态
    let slideTimer = null;
    let currentSlideIndex = 0;
    let isPlaying = true;
    let preloadCache = { images: {}, videos: {} };

    const dom = {
        img: document.getElementById('main-image'),
        video: document.getElementById('main-video'),
        area: document.getElementById('display-area'),
        status: document.getElementById('connection-status'),
        remoteStatus: document.getElementById('remote-status'),
        loginPanel: document.getElementById('login-panel'),
        controlPanel: document.getElementById('control-panel'),
        toast: document.getElementById('toast')
    };

    // === 1. 预加载逻辑 (仅大屏端需要) ===
    function initPreloader() {
        if (isRemoteMode) return; // 手机端不预加载

        let total = ASSETS.slideshow.length + 2 + 1; // 图片+A+B+视频
        let loaded = 0;

        const check = () => {
            loaded++;
            if (loaded >= total) {
                dom.status.innerHTML = '<span style="color:#4CAF50">✅ 资源就绪 | 等待指令</span>';
                dom.status.classList.add('connected');
            } else {
                dom.status.innerText = `预加载中... (${loaded}/${total})`;
            }
        };

        // 预加载轮播图
        ASSETS.slideshow.forEach(src => {
            const img = new Image();
            img.src = src;
            img.onload = check;
            img.onerror = check;
            preloadCache.images[src] = img;
        });
        // 预加载静态图
        [ASSETS.A, ASSETS.B].forEach(src => {
            const img = new Image();
            img.src = src;
            img.onload = check;
            img.onerror = check;
            preloadCache.images[src] = img;
        });
        // 预加载视频
        const vid = document.createElement('video');
        vid.src = ASSETS.video;
        vid.preload = 'auto';
        vid.onloadeddata = check;
        vid.onerror = check;
        preloadCache.videos[ASSETS.video] = vid;
    }

    // === 2. MQTT 通信逻辑 ===
    function connectMQTT(room) {
        if (client) client.end();

        const topicCmd = `classroom/${room}/command`;
        const topicStatus = `classroom/${room}/status`;

        client = mqtt.connect(`ws://${MQTT_OPTIONS.hostname}:${MQTT_OPTIONS.port}${MQTT_OPTIONS.path}`, {
            clientId: MQTT_OPTIONS.clientId
        });

        client.on('connect', () => {
            console.log('MQTT Connected');
            if (!isRemoteMode) {
                // 大屏端：订阅命令
                client.subscribe(topicCmd, (err) => {
                    if (!err) {
                        dom.status.innerHTML = `<span style="color:#4CAF50">🟢 已连接 (房间: ${room})</span>`;
                        dom.status.classList.add('connected');
                        publishStatus('online');
                    }
                });
            } else {
                // 手机端：连接成功
                dom.loginPanel.style.display = 'none';
                dom.controlPanel.style.display = 'flex';
                dom.remoteStatus.innerText = `🟢 已连接到 ${room}`;
                showToast('连接成功！');
            }
        });

        client.on('message', (topic, message) => {
            if (topic === topicCmd && !isRemoteMode) {
                handleCommand(message.toString());
            }
        });

        client.on('error', (err) => {
            console.error(err);
            if (!isRemoteMode) {
                dom.status.innerText = '❌ 连接失败，请检查网络';
                dom.status.style.color = 'red';
            }
        });
    }

    function publishCommand(cmd) {
        if (!client || !client.connected) {
            showToast('未连接服务器');
            return;
        }
        const topic = `classroom/${currentRoom}/command`;
        client.publish(topic, cmd, { qos: 1 }, (err) => {
            if (!err) showToast('指令已发送');
        });
    }

    function publishStatus(status) {
        if (!client || !client.connected) return;
        const topic = `classroom/${currentRoom}/status`;
        client.publish(topic, status, { qos: 1 });
    }

    // === 3. 业务逻辑处理 ===
    function handleCommand(cmd) {
        console.log('收到指令:', cmd);
        switch(cmd) {
            case 'slideshow': startSlideshow(); break;
            case 'showA': showSingle(ASSETS.A); break;
            case 'showB': showSingle(ASSETS.B); break;
            case 'playVideo': playVideo(); break;
            case 'stop': stopAll(); break;
            case 'togglePlay': togglePlay(); break;
        }
    }

    // 发送指令 (供按钮调用)
    function sendCommand(cmd) {
        if (isRemoteMode) {
            publishCommand(cmd);
        } else {
            // 本地直接执行 (兼容无手机时的单机操作)
            handleCommand(cmd);
        }
    }

    // --- 具体动作 ---
    function clearDisplay() {
        dom.area.classList.remove('active');
        dom.img.style.display = 'none';
        dom.video.style.display = 'none';
        dom.video.pause();
        if (slideTimer) clearInterval(slideTimer);
    }

    function showImage(src) {
        clearDisplay();
        if (preloadCache.images[src]) dom.img.src = preloadCache.images[src].src;
        else dom.img.src = src;
        
        dom.img.style.display = 'block';
        dom.area.classList.add('active');
    }

    function showVideo(src) {
        clearDisplay();
        if (preloadCache.videos[src]) dom.video.src = preloadCache.videos[src].src;
        else dom.video.src = src;
        
        dom.video.style.display = 'block';
        dom.video.play().catch(e => console.log('需交互'));
        dom.area.classList.add('active');
    }

    function startSlideshow() {
        stopAll();
        currentSlideIndex = 0;
        renderSlide();
        slideTimer = setInterval(() => {
            if (!isPlaying) return;
            currentSlideIndex = (currentSlideIndex + 1) % ASSETS.slideshow.length;
            renderSlide();
        }, 5000);
    }

    function renderSlide() {
        showImage(ASSETS.slideshow[currentSlideIndex]);
    }

    function showSingle(src) {
        stopAll();
        showImage(src);
    }

    function playVideo() {
        stopAll();
        showVideo(ASSETS.video);
    }

    function togglePlay() {
        isPlaying = !isPlaying;
        if (dom.video.style.display === 'block') {
            isPlaying ? dom.video.play() : dom.video.pause();
        }
    }

    function stopAll() {
        if (slideTimer) clearInterval(slideTimer);
        clearDisplay();
        isPlaying = false;
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    // === 4. 界面交互逻辑 ===
    function toggleRemoteMode() {
        isRemoteMode = true;
        document.body.classList.add('remote-mode');
        dom.mobileController = document.getElementById('mobile-controller');
        dom.mobileController.classList.add('active');
        // 如果是从大屏切过去，断开大屏的订阅，准备作为控制器重连
        if (client) client.end(); 
        currentRoom = document.getElementById('room-display').innerText;
        document.getElementById('room-input').value = currentRoom;
    }

    function exitRemoteMode() {
        isRemoteMode = false;
        document.body.classList.remove('remote-mode');
        document.getElementById('mobile-controller').classList.remove('active');
        // 重新以大屏身份连接
        connectMQTT(currentRoom);
        initPreloader();
    }

    function startRemoteControl() {
        const roomInput = document.getElementById('room-input').value.trim();
        if (!roomInput) {
            alert('请输入房间号');
            return;
        }
        currentRoom = roomInput;
        document.getElementById('btn-connect').disabled = true;
        document.getElementById('btn-connect').innerText = '连接中...';
        
        connectMQTT(currentRoom);
    }

    function showToast(msg) {
        dom.toast.innerText = msg;
        dom.toast.classList.add('show');
        setTimeout(() => dom.toast.classList.remove('show'), 2000);
    }

    // === 初始化 ===
    window.onload = function() {
        // 默认以大屏模式启动
        currentRoom = DEFAULT_ROOM;
        document.getElementById('room-display').innerText = currentRoom;
        connectMQTT(currentRoom);
        initPreloader();
    };
</script>
</body>
</html>
