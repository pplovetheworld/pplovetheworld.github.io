<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大屏轮播 (稳定版)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* 纯黑背景 */
            font-family: sans-serif;
        }
        #screen {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #mainImage {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none; /* 初始隐藏，加载后显示 */
        }
        #status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #fff;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="screen">
    <img id="mainImage" src="" alt="Slide">
</div>
<div id="status">系统初始化...</div>

<!-- 使用稳定的 MQTT CDN -->
<script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>

<script>
    // ================= 配置区 (请在此修改) =================
    
    // 1. 图片列表 (请确保 images 文件夹下有这些文件)
    const LIST_SLIDESHOW = [
        '001.jpg',
        '002.jpg',
        '003.jpg',
        '004.jpg',
        '005.jpg'
        // 如果有更多，继续添加...
    ];

    // 2. MQTT 配置 (如果之前这个能连上，就不要改)
    const MQTT_CONFIG = {
        broker: 'wss://broker.emqx.io:8083/mqtt', // 如果这个连不上，请换回你之前的地址
        topic: 'digital-signage/control'
    };

    // ================= 核心变量 =================
    let currentMode = 'none'; // 'none' 或 'slideshow'
    let currentSlideIndex = -1;
    let isPreloading = false;
    let nextSlidePending = false;
    let slideshowTimer = null;
    
    // 预加载图片对象
    const preloadImg = new Image();

    const dom = {
        img: document.getElementById('mainImage'),
        status: document.getElementById('status')
    };

    // ================= 初始化 =================
    window.onload = function() {
        console.log("✅ 页面加载完成");
        dom.status.innerText = "⏳ 等待连接...";
        
        // 尝试连接 MQTT
        connectMQTT();
    };

    // ================= MQTT 逻辑 (简化版) =================
    function connectMQTT() {
        console.log("📡 正在连接:", MQTT_CONFIG.broker);
        
        try {
            const client = mqtt.connect(MQTT_CONFIG.broker, {
                clientId: 'screen_' + Math.random().toString(16).substr(2, 8),
                clean: true,
                reconnectPeriod: 2000 // 2秒重连
            });

            client.on('connect', () => {
                console.log("✅ MQTT 连接成功");
                dom.status.innerText = "✅ 已连接 (等待指令)";
                client.subscribe(MQTT_CONFIG.topic);
            });

            client.on('message', (topic, message) => {
                const msgStr = message.toString();
                console.log("📩 收到:", msgStr);
                handleCommand(msgStr);
            });

            client.on('error', (err) => {
                console.error("❌ MQTT 错误:", err);
                dom.status.innerText = "⚠️ 连接错误 (见控制台)";
                // 不阻断程序，只是显示错误
            });
            
            client.on('offline', () => {
                console.warn("⚠️ MQTT 离线");
                dom.status.innerText = "⚠️ 连接断开";
            });

        } catch (e) {
            console.error("❌ MQTT 启动失败:", e);
            dom.status.innerText = "❌ 启动失败";
        }
    }

    // ================= 指令处理 =================
    function handleCommand(msg) {
        // 兼容 JSON 和 纯文本
        let mode = '';
        try {
            if (msg.startsWith('{')) {
                const data = JSON.parse(msg);
                if (data.action === 'switchMode') mode = data.mode;
            } else {
                if (msg.includes('slideshow')) mode = 'slideshow';
                if (msg.includes('stop') || msg.includes('none')) mode = 'none';
            }
        } catch(e) {}

        if (mode === 'slideshow') {
            switchMode('slideshow');
        } else if (mode === 'none') {
            switchMode('none');
        }
    }

    function switchMode(mode) {
        if (mode === currentMode) return;
        
        console.log("🔄 切换模式:", mode);
        currentMode = mode;

        if (slideshowTimer) {
            clearInterval(slideshowTimer);
            slideshowTimer = null;
        }

        if (mode === 'slideshow') {
            dom.status.innerText = "🚀 开始轮播";
            // 如果还没开始过，从第一张开始
            if (currentSlideIndex === -1) currentSlideIndex = 0;
            
            // 立即切一张
            nextSlide();
            
            // 启动定时器
            slideshowTimer = setInterval(nextSlide, 5000);
        } else {
            dom.status.innerText = "⏸️ 已停止";
            currentSlideIndex = -1;
        }
    }

    // ================= 轮播逻辑 (经过验证的稳定版) =================
    function nextSlide() {
        if (currentMode !== 'slideshow') return;
        if (isPreloading) {
            nextSlidePending = true;
            return;
        }

        // 计算下一张索引
        currentSlideIndex = (currentSlideIndex + 1) % LIST_SLIDESHOW.length;
        const fileName = LIST_SLIDESHOW[currentSlideIndex];
        
        // 构建路径 (自动适配当前目录)
        const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
        const imgUrl = baseUrl + 'images/' + fileName + '?t=' + new Date().getTime();

        console.log(`⬇️ 预加载: ${fileName}`);
        dom.status.innerText = `⬇️ 加载: ${fileName}...`;
        
        isPreloading = true;
        nextSlidePending = false;

        // 绑定事件
        preloadImg.onload = function() {
            console.log(`✅ 加载成功: ${fileName}`);
            isPreloading = false;
            
            // 更新主图
            dom.img.src = imgUrl;
            dom.img.style.display = 'block';
            dom.status.innerText = `✨ 显示: ${fileName}`;

            // 检查是否有积压请求
            if (nextSlidePending) {
                setTimeout(nextSlide, 100);
            }
        };

        preloadImg.onerror = function() {
            console.error(`❌ 加载失败: ${fileName}`);
            isPreloading = false;
            dom.status.innerText = `❌ 失败: ${fileName}`;
            // 失败也尝试下一张，防止死锁
            if (nextSlidePending) {
                setTimeout(nextSlide, 100);
            }
        };

        // 触发加载
        preloadImg.src = imgUrl;
    }
</script>
</body>
</html>
